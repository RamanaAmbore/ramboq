<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Public-site favicon: gold RQ monogram on a navy shield with a
         bull-horn flourish. The (algo) layout overrides this with its
         own circled-algo favicon via <svelte:head>. -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/public-favicon.svg" />
    <link rel="alternate icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/logo.png" />

    <!-- SEO & Metadata for RamboQuant Analytics LLP -->
    <title>RamboQuant Analytics</title>
    <meta name="description" content="RamboQuant Analytics LLP – Your partner for active returns in the Indian stock markets." />
    <meta name="keywords" content="RamboQuant Analytics, investments, trading, finance, Indian stock market, stocks, derivatives, ETFs" />
    <meta name="author" content="RamboQuant Analytics LLP" />
    <meta name="robots" content="index, follow" />
    <meta name="google-site-verification" content="Gxa9sHLYv2meW1M0lk9U9YmPZLpLA25yY7whTUBPjU0" />
    <link rel="canonical" href="https://ramboq.com/" />

    <!-- Open Graph for Social Sharing (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:title" content="RamboQuant Analytics – Invest. Grow. Compound." />
    <meta property="og:description" content="Expert investing and trading strategies in the Indian stock markets." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ramboq.com" />
    <meta property="og:image" content="https://www.dropbox.com/scl/fi/ym88yks11py2gsrly9mf8/ramboq_bull1.png?rlkey=gf7vfxzc0d208sof0p90vfdnd&st=lhqlmb4w&raw=1" />
    <meta property="og:image:width" content="200" />
    <meta property="og:image:height" content="200" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RamboQuant Analytics – Invest. Grow. Compound." />
    <meta name="twitter:description" content="Expert investing and trading strategies in the Indian stock markets." />
    <meta name="twitter:image" content="https://www.dropbox.com/scl/fi/ym88yks11py2gsrly9mf8/ramboq_bull1.png?rlkey=gf7vfxzc0d208sof0p90vfdnd&st=lhqlmb4w&raw=1" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RamboQuant Analytics LLP",
      "url": "https://ramboq.com",
      "logo": "https://ramboq.com/logo.png",
      "description": "Expert investing and trading strategies in the Indian stock markets.",
      "foundingDate": "2024",
      "address": { "@type": "PostalAddress", "addressCountry": "IN" }
    }
    </script>

    <!-- Theme color -->
    <meta name="theme-color" content="#2f4f4f" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-text">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
