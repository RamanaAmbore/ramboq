<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary SEO -->
    <title>RamboQuant Analytics LLP — Portfolio Performance & Market Intelligence</title>
    <meta name="description" content="RamboQuant Analytics LLP provides portfolio performance tracking, AI-powered market reports, and investment analytics for partners. Real-time holdings, positions, and fund monitoring." />
    <meta name="keywords" content="RamboQuant, portfolio analytics, market intelligence, investment tracking, holdings, positions, AI market report, Zerodha, India stock market, NSE, MCX" />
    <meta name="author" content="RamboQuant Analytics LLP" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ramboq.com/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RamboQuant Analytics LLP" />
    <meta property="og:title" content="RamboQuant Analytics LLP — Portfolio Performance & Market Intelligence" />
    <meta property="og:description" content="Real-time portfolio tracking, AI market reports, and investment analytics for partners." />
    <meta property="og:url" content="https://ramboq.com/" />
    <meta property="og:image" content="https://ramboq.com/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="RamboQuant Analytics LLP" />
    <meta name="twitter:description" content="Portfolio performance tracking & AI market intelligence." />
    <meta name="twitter:image" content="https://ramboq.com/logo.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RamboQuant Analytics LLP",
      "url": "https://ramboq.com",
      "logo": "https://ramboq.com/logo.png",
      "description": "Portfolio performance tracking, AI-powered market reports, and investment analytics.",
      "foundingDate": "2024",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "sameAs": []
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RamboQuant Analytics",
      "url": "https://ramboq.com",
      "description": "Investment analytics and portfolio tracking platform"
    }
    </script>

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#2f4f4f" />
    <meta name="msapplication-TileColor" content="#2f4f4f" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-bg text-text">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
