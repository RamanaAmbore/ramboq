# Order-entry command grammar.
#
# Language-agnostic schema (loadable from Python AND JavaScript).
# Suggester / resolver hooks are referenced by name ("kind: symbol") and
# implemented separately in each runtime.
#
# Token flow for buy/sell:
#   account → instType → symbol(3+ chars) → strike(CALL/PUT) → expiry(non-EQ)
#   → qty → orderType → price(non-MARKET) → chase(non-MARKET)
#
# The resolved Kite tradingsymbol is shown in brackets at the end as a preview.

verbs:
  buy:
    description: "Place a buy order"
    tokens:
      - role: account
        kind: account
        required: true
      - role: instType
        values: [CALL, PUT, FUT, EQ]
        required: false
        parse: upper
        hint: "CALL | PUT | FUT | EQ (default: EQ)"
      - role: symbol
        kind: symbol
        required: true
        hint: "underlying — type 3+ chars"
      - role: strike
        kind: strike
        required: "if:instType==CALL|PUT"
        parse: float
        hint: "strike price (* = wide spread)"
      - role: expiry
        kind: expiry
        required: "if:instType==CALL|PUT|FUT"
        hint: "expiry date"
      - role: qty
        kind: qty
        required: true
        parse: int
        hint: "quantity (lots × lot_size for F&O)"
      - role: orderType
        values: [LIMIT, SL, SL-M, MARKET]
        required: true
        parse: upper
        hint: "LIMIT | SL | SL-M | MARKET"
      - role: price
        kind: price
        required: "if:orderType!=MARKET"
        parse: float
        hint: "limit/trigger price"
      - role: chase
        values: [LOW, MED, HIGH]
        required: false
        parse: upper
        hint: "chase aggressiveness (non-MARKET only)"
    kwargs:
      product:
        values: [MIS, NRML, CNC]

  sell:
    description: "Place a sell order"
    tokens:
      - role: account
        kind: account
        required: true
      - role: instType
        values: [CALL, PUT, FUT, EQ]
        required: false
        parse: upper
        hint: "CALL | PUT | FUT | EQ (default: EQ)"
      - role: symbol
        kind: symbol
        required: true
        hint: "underlying — type 3+ chars"
      - role: strike
        kind: strike
        required: "if:instType==CALL|PUT"
        parse: float
        hint: "strike price (* = wide spread)"
      - role: expiry
        kind: expiry
        required: "if:instType==CALL|PUT|FUT"
        hint: "expiry date"
      - role: qty
        kind: qty
        required: true
        parse: int
        hint: "quantity (lots × lot_size for F&O)"
      - role: orderType
        values: [LIMIT, SL, SL-M, MARKET]
        required: true
        parse: upper
        hint: "LIMIT | SL | SL-M | MARKET"
      - role: price
        kind: price
        required: "if:orderType!=MARKET"
        parse: float
        hint: "limit/trigger price"
      - role: chase
        values: [LOW, MED, HIGH]
        required: false
        parse: upper
        hint: "chase aggressiveness (non-MARKET only)"
    kwargs:
      product:
        values: [MIS, NRML, CNC]

  cancel:
    description: "Cancel an open order"
    tokens:
      - role: order_id
        kind: order_id
        required: true

  modify:
    description: "Modify an open order"
    tokens:
      - role: order_id
        kind: order_id
        required: true
    kwargs:
      price:
        parse: float
      qty:
        parse: int
      chase:
        values: [LOW, MED, HIGH]
        parse: upper

# Chase level → engine config
chase_levels:
  LOW:  { band_ticks: 8, retry_seconds: 60 }
  MED:  { band_ticks: 4, retry_seconds: 30 }
  HIGH: { band_ticks: 1, retry_seconds: 10 }
