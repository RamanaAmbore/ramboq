# Connection settings
# `retry_count` moved to DB (`connections.retry_count`) — tune live from
# /admin/settings without a deploy. `conn_reset_hours` stays here as a
# Kite-vendor constant (token TTL is fixed by Kite, not an operator knob).
conn_reset_hours: 23

# Log file paths (relative to app working directory — works uniformly for prod and dev).
# The earlier short_* tail files were removed: they were rewritten in full on every line,
# which burned dozens of sync I/O ops per minute during alert bursts. /api/admin/logs now
# tails log_file directly.
file_log_file: .log/log_file
error_log_file: .log/error_file

# Log levels (Python logging: 10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR).
# Boot-time defaults — handlers wire from these at module import. Live
# changes from /admin/settings → DB key `logging.<file|console|error>_log_level`
# fire `_apply_live_effects` and reconfigure the handlers in place.
file_log_level: 10
error_log_level: 40
console_log_level: 40

# `enforce_password_standard` moved to DB (`auth.enforce_password_standard`).

# Per-capability toggles. The section consulted at runtime depends on
# deploy_branch:
#   - main         → cap_in_prod.<cap>   (missing key ⇒ True, prod defaults on)
#   - anything else → cap_in_dev.<cap>   (missing key ⇒ False, dev is opt-in)
# Check gate with is_enabled('<cap>'). deploy.sh preserves both dicts verbatim
# across deploys so operator tweaks survive.

cap_in_dev:
  genai:            False  # GenAI market update (Gemini)
  telegram:         False  # Telegram alert notifications
  mail:             False  # Email notifications (SMTP)
  notify_on_deploy: True   # Send test Telegram+email on each deploy
  market_feed:      False  # Market news feed (Google News RSS)
  simulator:        True   # /api/simulator market simulator (dev default: on)

cap_in_prod:
  simulator:        False  # /api/simulator market simulator (prod default: off — never run
                           # fabricated market data in production)

# `genai_thinking_budget` moved to DB (`genai.thinking_budget`).

# Set by deploy script — current git branch; used to prefix Telegram/email messages on non-main branches
deploy_branch: main

# ── Operational tunables — all moved to DB ─────────────────────────────────
# Every knob in these areas now lives in the `settings` table and is
# editable from /admin/settings without a redeploy:
#
#   alerts.rate_window_min, alerts.baseline_offset_min, alerts.cooldown_minutes,
#     alerts.suppress_delta_abs, alerts.suppress_delta_pct
#   performance.refresh_interval, performance.open_summary_offset_min,
#     performance.close_summary_offset_min, performance.market_refresh_time
#   connections.retry_count, auth.enforce_password_standard,
#     genai.thinking_budget
#   algo.chase_interval_seconds, algo.aggression_step, algo.max_attempts,
#     algo.expiry_start_offset_hours, algo.expiry_ntm_buffer_pct,
#     algo.expiry_rescan_minutes
#
# In-code defaults match what these YAML keys used to set, so the system
# boots safely even before the settings cache is loaded. The DB seeder
# writes those same defaults on first boot.

# Market segments — used to determine fetch window and open/close summaries
# holiday_exchange: exchange name passed to kite.holidays()
# exchanges: list of kite position exchange values belonging to this segment
market_segments:
  equity:
    hours_start: "09:15"
    hours_end: "15:30"
    holiday_exchange: "NSE"
    exchanges: ["NSE", "BSE", "NFO", "CDS"]
  commodity:
    hours_start: "09:00"
    hours_end: "23:30"
    holiday_exchange: "MCX"
    exchanges: ["MCX"]

# Algo agent (chase + expiry) — every knob moved to DB:
#   algo.chase_interval_seconds, algo.aggression_step, algo.max_attempts
#   algo.expiry_start_offset_hours, algo.expiry_ntm_buffer_pct,
#   algo.expiry_rescan_minutes
# Tune all of these from /admin/settings without a redeploy.
