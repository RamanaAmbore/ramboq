# Connection settings
retry_count: 3
conn_reset_hours: 23

# Log file paths (relative to app working directory — works uniformly for prod and dev)
file_log_file: .log/log_file
error_log_file: .log/error_file
short_file_log_file: .log/short_log_file
short_error_log_file: .log/short_error_file

# Log levels (Python logging: 10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR)
file_log_level: 10
error_log_level: 40
console_log_level: 40

# App flags — override on server after initial deploy (preserved across deploys by deploy scripts)
enforce_password_standard: False

# cap_in_dev: per-capability toggles for the DEV environment.
# IGNORED on prod (deploy_branch == 'main') where every capability is always on.
# Check gate with is_enabled('<cap>'). To add a new capability, append its key below
# and call is_enabled('<cap>') at the usage site — no other code changes needed.
cap_in_dev:
  genai: False             # GenAI market update (Gemini)
  telegram: False          # Telegram alert notifications
  mail: False              # Email notifications (SMTP)
  notify_on_deploy: True  # Send test Telegram+email on each deploy
  market_feed: False       # Market news feed (Google News RSS)

# Gemini 2.5 Flash allocates part of max_output_tokens to internal "thinking". Cap
# it here so the actual market-report response has room (avoids mid-sentence truncation).
genai_thinking_budget: 512

# Set by deploy script — current git branch; used to prefix Telegram/email messages on non-main branches
deploy_branch: main

# ── Loss alert thresholds ───────────────────────────────────────────────────
# Checked after every background performance refresh during market hours.
# All thresholds are parameterised so they can be tuned on the server without
# touching code. Set any value to 0 to disable that rule. Telegram credentials
# and alert_emails go in secrets.yaml.
#
# Two categories of rule fire alerts, both designed to "only wake you when
# something is really going wrong":
#   1. Static floors  — trip when P&L crosses a fixed threshold (₹ or %).
#   2. Rate of change — trip when P&L is deteriorating fast (per-minute
#      over a rolling window). Rate rules are disabled for the first
#      alert_baseline_offset_min minutes after market open so the normal
#      opening gap does NOT register as a rate event.

# --- Static floors -----------------------------------------------------------
# Holdings (long equity) — % only, no absolute floor. Equities seldom move
# fast enough for ₹-floors to be useful.
alert_hold_static_pct_acct:  3.0      # per-account holdings day-loss % floor
alert_hold_static_pct_total: 5.0      # portfolio total holdings day-loss % floor

# Positions (F&O/NFO) — both ₹ and % triggers independently. Loss % is
# computed as |pnl| / used_margin for that account (total for aggregated).
alert_pos_static_pct_acct:    2.0     # per-account positions loss % floor
alert_pos_static_pct_total:   2.0     # portfolio total positions loss % floor
alert_pos_static_abs_acct:   30000    # per-account positions ₹ loss floor
alert_pos_static_abs_total:  50000    # portfolio total positions ₹ loss floor

# --- Rate-of-change ----------------------------------------------------------
alert_rate_window_min: 10             # minutes of history used to compute rate

alert_hold_rate_abs_per_min_acct:   2000   # per-account holdings ₹/min slide
alert_hold_rate_abs_per_min_total:  4000   # total     holdings ₹/min slide
alert_hold_rate_pct_per_min:          0.15 # holdings  %/min   (scope-agnostic)

alert_pos_rate_abs_per_min_acct:    3000   # per-account positions ₹/min slide
alert_pos_rate_abs_per_min_total:   6000   # total     positions ₹/min slide
alert_pos_rate_pct_per_min:           0.25 # positions %/min  (scope-agnostic)

# --- Suppression -------------------------------------------------------------
# After a bucket alerts once, block re-firing until one of these is true:
#   * loss deepened by >= alert_suppress_delta_abs ₹
#   * loss deepened by >= alert_suppress_delta_pct %
#   * alert_cooldown_minutes have elapsed
alert_suppress_delta_abs: 15000
alert_suppress_delta_pct: 0.5
alert_cooldown_minutes:   30

# --- Opening-gap handling ----------------------------------------------------
alert_baseline_offset_min: 15         # minutes after market open before rate rules go live

# Background refresh settings (all times in India IST)
background_refresh: True
performance_refresh_interval: 5    # minutes — must match get_nearest_time interval
market_refresh_time: "08:30"       # IST — pre-fetch market update once per day before market opens
open_summary_offset_minutes: 15    # minutes after segment open to send open summary
close_summary_offset_minutes: 15   # minutes after segment close to send close summary

# Market segments — used to determine fetch window and open/close summaries
# holiday_exchange: exchange name passed to kite.holidays()
# exchanges: list of kite position exchange values belonging to this segment
market_segments:
  equity:
    hours_start: "09:15"
    hours_end: "15:30"
    holiday_exchange: "NSE"
    exchanges: ["NSE", "BSE", "NFO", "CDS"]
  commodity:
    hours_start: "09:00"
    hours_end: "23:30"
    holiday_exchange: "MCX"
    exchanges: ["MCX"]

# Algo agent — adaptive order chasing and expiry auto-close
algo:
  chase_interval_seconds: 20        # seconds between price adjustments
  aggression_step: 0.10             # spread fraction increase per attempt
  max_attempts: 20                  # max attempts before giving up
  expiry_start_offset_hours: 2      # hours before market close to start closing
  expiry_ntm_buffer_pct: 2.0        # % from strike to flag as near-the-money
  expiry_rescan_minutes: 30         # re-scan interval for new ITM positions
