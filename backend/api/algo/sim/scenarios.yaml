# Market-simulation scenarios for /api/simulator/*.
#
# Model B — per-symbol state + LTP-driven ticks.
#
# With the synthesizer (backend/api/algo/sim/synthesize.py), scenarios are
# no longer hand-maintained per agent — the "Run in Simulator" button on
# the /agents page builds a scenario from the agent's own condition tree
# at click time. What lives here now is a small set of **agent-agnostic
# book-wide stress tests**: generic crash, generic euphoria, random walk.
# These work against any seeded book (scripted initial isn't required —
# the synthesizer or seed=live provides state).
#
# Each scenario declares:
#   slug        — stable id referenced by the UI + API
#   mode        — 'symbol' (default) | 'aggregate' (legacy)
#   initial:    — optional per-symbol rows (not required when seed=live)
#   ticks:      — list of {at, moves} entries; `moves` is a list of move
#                 primitives (pct / abs / random_walk / target_pnl / set_margin)
#
# Glob syntax is `section.account.tradingsymbol`. `*` matches one segment,
# `**` matches any remaining path. `holdings.**`, `positions.*.NIFTY*`, etc.

# ─────────────────────────────────────────────────────────────────────────
# Generic crash — prices DOWN. Hurts long holdings and long positions.
# ─────────────────────────────────────────────────────────────────────────
- slug: generic-crash
  name: Generic crash (-6% holdings, -3% positions)
  mode: symbol
  description: >-
    Drops every holding 2% / 4% / 6% across three ticks, positions -1% / -2%
    / -3%. Designed for seed_mode=live — stress-tests your actual long book.
    Short positions benefit here; use generic-euphoria for short stress.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "holdings.**",  value: -0.02}
        - {type: pct, scope: "positions.**", value: -0.01}
    - at: 1
      moves:
        - {type: pct, scope: "holdings.**",  value: -0.02}
        - {type: pct, scope: "positions.**", value: -0.01}
    - at: 2
      moves:
        - {type: pct, scope: "holdings.**",  value: -0.02}
        - {type: pct, scope: "positions.**", value: -0.01}

# ─────────────────────────────────────────────────────────────────────────
# Generic euphoria — prices UP. Hurts SHORT positions (common in F&O
# books that sell options or carry short futures). Holdings benefit here
# since they can't be short.
# ─────────────────────────────────────────────────────────────────────────
- slug: generic-euphoria
  name: Generic euphoria (+3% positions over 3 ticks)
  mode: symbol
  description: >-
    Rallies every position +1% / +2% / +3% across three ticks. For F&O
    books with short options / short futures, an up-move is a loss —
    this catches the stress cases the crash scenario misses.
  ticks:
    - at: 0
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}
    - at: 1
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}
    - at: 2
      moves:
        - {type: pct, scope: "positions.**", value: 0.01}

# ─────────────────────────────────────────────────────────────────────────
# Random walk — drift-with-vol stress on whatever positions exist. Good
# for "no agent in particular; does anything fire unexpectedly?"
# ─────────────────────────────────────────────────────────────────────────
- slug: random-walk
  name: Random walk (drift down)
  mode: symbol
  seed: 42
  description: >-
    Geometric random walk on every holding + position: drift -0.1%/tick,
    vol 0.5%. Seeded (42) so runs are reproducible. Pair with
    seed_mode=live to shake your real book.
  ticks:
    - at: 0
      moves:
        - {type: random_walk, scope: "holdings.**",  drift: -0.001, vol: 0.005}
        - {type: random_walk, scope: "positions.**", drift: -0.001, vol: 0.005}
