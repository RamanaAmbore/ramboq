# Connection settings
retry_count: 3
conn_reset_hours: 23

# Log file paths (relative to app working directory — works uniformly for prod, dev, and pod)
file_log_file: .log/log_file
error_log_file: .log/error_file
short_file_log_file: .log/short_log_file
short_error_log_file: .log/short_error_file

# Log levels (Python logging: 10=DEBUG, 20=INFO, 30=WARNING, 40=ERROR)
file_log_level: 10
error_log_level: 40
console_log_level: 40

# App flags — override on server after initial deploy (preserved across deploys by deploy scripts)
prod: False
mail: False
perplexity: False
enforce_password_standard: False

# Loss alert thresholds — checked after every background performance refresh (during market hours)
# Set to 0 to disable a threshold. alert_emails and telegram credentials go in secrets.yaml.
alert_loss_abs: 10000          # alert if day loss > ₹10,000 for any account or TOTAL
alert_loss_pct: 2.0            # alert if day loss % > 2% for any account or TOTAL
alert_cooldown_minutes: 30     # minimum minutes between repeat alerts for the same account

# Background refresh settings (all times in India IST)
background_refresh: True
performance_refresh_interval: 5    # minutes — must match get_nearest_time interval
market_refresh_time: "08:30"       # IST — pre-fetch market update once per day before market opens
market_hours_start: "09:00"        # IST — start background broker data refresh
market_hours_end: "15:30"          # IST — stop background broker data refresh
